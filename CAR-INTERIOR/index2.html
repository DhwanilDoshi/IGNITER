<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Advanced 360 Eye Tracking</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    body { margin: 0; background: black; }

    #panorama { width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 14px;
      z-index: 9999;
      display: none;
      max-height: 90vh;
      overflow-y: auto;
    }

    button {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 9999;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button onclick="toggleHUD()">Toggle Tracking</button>
<div id="hud"></div>
<div id="panorama"></div>

<canvas id="maskCanvas" style="display:none;"></canvas>

<script>
// ------------------ 360 VIEWER ------------------
const viewer = pannellum.viewer('panorama', {
  type: "equirectangular",
  panorama: "car3.jpg",
  autoLoad: true
});

// ------------------ LOAD MASK ------------------
const maskImg = new Image();
maskImg.src = "mask.png";

const maskCanvas = document.getElementById("maskCanvas");
const ctx = maskCanvas.getContext("2d");

// ------------------ FINAL COLOR-MAP ------------------
const PARTS = {
  "ff0000": "Steering Wheel",     // MAIN steering
  "ffff00": "Cluster",            // INSIDE steering priority
  "0000ff": "AC",
  "00ff00": "Infotainment",
  "00ffff": "Gear",
  "ff00ff": "Handrest",
  "ff7f00": "Accelerator/Brake",
  "8000ff": "Driver Door",
  "7fff00": "Windshield",
  "00bfff": "Passenger Dashboard",
  "ff1493": "Passenger Door",
  "008080": "Passenger Seat",
  "ff6347": "Driver Seat",
  "ffd700": "Sun Visor",
  "7fffd4": "Rear View Mirror",
  "adff2f": "Back Seat",
  "9400d3": "Sunroof"
};

// Tracking time storage
const timeSpent = {};
Object.values(PARTS).forEach(p => timeSpent[p] = 0);

// ------------------ TRACKING LOOP ------------------
maskImg.onload = () => {
  maskCanvas.width = maskImg.width;
  maskCanvas.height = maskImg.height;
  ctx.drawImage(maskImg, 0, 0);

  setInterval(trackPixel, 200);
};

function trackPixel() {
  const yaw = viewer.getYaw();
  const pitch = viewer.getPitch();
  const hfov = viewer.getHfov();   // zoom level (lower = zoomed in)

  const x = Math.floor((yaw + 180) / 360 * maskCanvas.width);
  const y = Math.floor((90 - pitch) / 180 * maskCanvas.height);

  const pixel = ctx.getImageData(x, y, 1, 1).data;
  const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);

  let part = PARTS[hex];

  // -------------------------------
  // ⭐ SMART LOGIC: Steering vs Cluster
  // -------------------------------
  if (hex === "ff0000" || hex === "ffff00") {

      // Steering = ff0000
      // Cluster  = ffff00

      if (hfov > 55) {
          // Zoomed OUT → steering wheel dominates
          part = PARTS["ff0000"];
      } else {
          // Zoomed IN → cluster dominates
          part = PARTS["ffff00"];
      }
  }

  if (part) {
      timeSpent[part] += 0.2;
  }

  updateHUD();
}


function updateHUD() {
  let html = "<b>Eye Tracking (AI-ready)</b><br><br>";
  for (let part in timeSpent) {
    html += `${part}: ${timeSpent[part].toFixed(1)} s<br>`;
  }
  document.getElementById("hud").innerHTML = html;
}

function toggleHUD() {
  const hud = document.getElementById("hud");
  hud.style.display = hud.style.display === "none" ? "block" : "none";
}

function rgbToHex(r, g, b) {
  return [r, g, b].map(x => x.toString(16).padStart(2, "0")).join("");
}
</script>

</body>
</html>
