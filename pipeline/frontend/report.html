<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGNITER — Experience Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0a0c10; --card: #13161d; --border: #1e2330;
    --accent: #00c8ff; --accent2: #7c5cfc; --text: #e2e8f0;
    --muted: #6b7280; --good: #22c55e; --warn: #f59e0b; --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  .page-header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 20px 32px; display: flex; align-items: center; gap: 16px;
  }
  .page-header h1 {
    font-size: 1.4rem; font-weight: 800; letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .page-header .meta { font-size: 0.8rem; color: var(--muted); }
  .page-header .meta strong { color: var(--text); }
  .spacer { flex: 1; }
  .btn-print {
    padding: 8px 18px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-size: 0.82rem; cursor: pointer;
  }
  .btn-new {
    padding: 8px 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 8px;
    color: #000; font-size: 0.82rem; font-weight: 700; cursor: pointer;
  }

  /* ── Layout ── */
  .content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  @media (max-width: 760px) { .grid2,.grid3,.grid4 { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
  }
  .card-title {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
  }

  /* ── Metric tiles ── */
  .metric { text-align: center; }
  .metric .val {
    font-size: 2rem; font-weight: 800; color: var(--accent);
    line-height: 1;
  }
  .metric .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .metric .sub { font-size: 0.8rem; color: var(--text); margin-top: 2px; }

  /* ── Insights ── */
  .insight-list { list-style: none; }
  .insight-list li {
    padding: 10px 14px; margin-bottom: 8px;
    background: rgba(0,200,255,0.05);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 0.88rem; line-height: 1.5; color: var(--text);
  }
  .insight-list li.neg { border-color: var(--danger); background: rgba(239,68,68,0.05); }
  .insight-list li.warn { border-color: var(--warn); background: rgba(245,158,11,0.05); }

  /* ── Part detail table ── */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { padding: 8px 12px; text-align: left; color: var(--muted); font-weight: 600; font-size: 0.75rem; border-bottom: 1px solid var(--border); }
  td { padding: 9px 12px; border-bottom: 1px solid rgba(30,35,48,0.6); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  .emo-tag {
    display: inline-block; padding: 2px 8px;
    border-radius: 10px; font-size: 0.75rem; font-weight: 600;
    background: rgba(124,92,252,0.15); color: var(--accent2);
  }
  .bar-mini { height: 6px; border-radius: 3px; background: var(--accent); display: inline-block; }

  /* ── Survey responses ── */
  .survey-q { margin-bottom: 14px; }
  .survey-q .sq-text { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
  .survey-q .sq-ans { font-size: 0.92rem; color: var(--text); }
  .stars-display { color: var(--warn); letter-spacing: 2px; }

  /* ── Chart containers ── */
  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap-sm { position: relative; height: 180px; }

  .section-title {
    font-size: 1rem; font-weight: 700; color: var(--text);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ""; flex: 1; height: 1px; background: var(--border);
  }
  .loading { text-align: center; padding: 80px 0; color: var(--muted); }
</style>
</head>
<body>

<div class="page-header">
  <h1>IGNITER</h1>
  <div class="meta" id="header-meta">Loading…</div>
  <div class="spacer"></div>
  <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
  <button class="btn-new" onclick="location.href='/'">New Session</button>
</div>

<div class="content" id="content">
  <div class="loading">Loading report…</div>
</div>

<script>
const params     = new URLSearchParams(location.search);
const SESSION_ID = params.get("session_id") || "";
if (!SESSION_ID) location.href = "/";

const EMOTION_COLORS = {
  Happy:"#22c55e", Surprise:"#f59e0b", Neutral:"#6b7280",
  Sad:"#60a5fa", Fear:"#a78bfa", Angry:"#ef4444", Disgust:"#f97316", unknown:"#374151"
};
const EMOTION_EMOJI = {
  Happy:"😊", Surprise:"😲", Neutral:"😐",
  Sad:"😢", Fear:"😨", Angry:"😠", Disgust:"🤢", unknown:"❓"
};

function emoTag(emo) {
  const color = EMOTION_COLORS[emo] || "#6b7280";
  const emoji = EMOTION_EMOJI[emo] || "❓";
  return `<span class="emo-tag" style="background:${color}22;color:${color}">${emoji} ${emo}</span>`;
}

function stressColor(v) {
  if (v === null || v === undefined) return "var(--muted)";
  if (v > 0.65) return "var(--danger)";
  if (v > 0.4)  return "var(--warn)";
  return "var(--good)";
}

function stars(rating) {
  const n = parseInt(rating) || 0;
  return `<span class="stars-display">${"★".repeat(n)}${"☆".repeat(5-n)}</span>`;
}

async function loadReport() {
  let s;
  try {
    const res = await fetch(`/api/session/${SESSION_ID}/summary`);
    if (!res.ok) throw new Error("Session not found");
    s = await res.json();
  } catch(e) {
    document.getElementById("content").innerHTML =
      `<div class="loading" style="color:var(--danger)">Error: ${e.message}</div>`;
    return;
  }

  // Header meta
  const u = s.user || {};
  const dur = Math.round(s.duration_seconds || 0);
  document.getElementById("header-meta").innerHTML =
    `<strong>${u.name || "Participant"}</strong> &nbsp;·&nbsp; Age ${u.age || "—"} &nbsp;·&nbsp; `+
    `Session <strong>${SESSION_ID}</strong> &nbsp;·&nbsp; Duration <strong>${Math.floor(dur/60)}m ${dur%60}s</strong>`;
  document.title = `IGNITER Report — ${u.name || SESSION_ID}`;

  // ── Top-level metrics ──────────────────────────────────────────────────────
  const topPart  = (s.top_parts || [])[0];
  const avgStr   = s.avg_stress;
  const disRate  = s.distraction_rate_pct;
  const blinkR   = s.blink_rate_per_min;

  const metricsHtml = `
  <div class="grid4">
    <div class="card metric">
      <div class="val" style="color:var(--accent)">${topPart ? topPart.validated_seconds + "s" : "—"}</div>
      <div class="sub">${topPart ? topPart.part : "—"}</div>
      <div class="lbl">Top Focus Area</div>
    </div>
    <div class="card metric">
      <div class="val" style="color:${EMOTION_COLORS[s.dominant_emotion]||'var(--muted)'}">
        ${EMOTION_EMOJI[s.dominant_emotion] || "❓"}
      </div>
      <div class="sub">${s.dominant_emotion || "—"}</div>
      <div class="lbl">Dominant Emotion</div>
    </div>
    <div class="card metric">
      <div class="val" style="color:${stressColor(avgStr)}">
        ${avgStr !== null && avgStr !== undefined ? (avgStr*100).toFixed(0)+"%" : "N/A"}
      </div>
      <div class="sub">${s.avg_bpm ? s.avg_bpm + " BPM" : "No sensor"}</div>
      <div class="lbl">Avg Physiological Stress</div>
    </div>
    <div class="card metric">
      <div class="val" style="color:${disRate>25?'var(--warn)':'var(--good)'}">
        ${disRate !== undefined ? disRate+"%" : "N/A"}
      </div>
      <div class="sub">${blinkR !== undefined ? blinkR + " blinks/min" : ""}</div>
      <div class="lbl">Distraction Rate</div>
    </div>
  </div>`;

  // ── AI Insights ────────────────────────────────────────────────────────────
  const NEG_KW = ["concern","negative","elevated stress","high distraction","strain","fatigue"];
  const WARN_KW = ["consider","may indicate","frequently"];
  const insightsHtml = (s.insights || []).map(txt => {
    const lower = txt.toLowerCase();
    let cls = "";
    if (NEG_KW.some(k => lower.includes(k))) cls = "neg";
    else if (WARN_KW.some(k => lower.includes(k))) cls = "warn";
    return `<li class="${cls}">💡 ${txt}</li>`;
  }).join("") || "<li>Not enough data to generate insights.</li>";

  // ── Dwell bar chart ────────────────────────────────────────────────────────
  const topParts = (s.top_parts || []).slice(0, 10);
  const chartPartLabels = topParts.map(p => p.part);
  const chartPartVals   = topParts.map(p => p.validated_seconds);
  const maxDwell        = Math.max(...chartPartVals, 1);

  // ── Emotion pie ────────────────────────────────────────────────────────────
  const emoDistrib = s.emotion_distribution || {};
  const emoLabels  = Object.keys(emoDistrib);
  const emoVals    = Object.values(emoDistrib);
  const emoColors  = emoLabels.map(l => EMOTION_COLORS[l] || "#6b7280");

  // ── Stress timeline ────────────────────────────────────────────────────────
  const stressTimeline = s.stress_timeline || [];

  // ── Part detail table ──────────────────────────────────────────────────────
  const partDetail = s.part_detail || {};
  const allParts   = Object.entries(partDetail)
    .sort(([,a],[,b]) => (b.validated_seconds||0) - (a.validated_seconds||0));

  const tableRows = allParts.map(([part, d]) => {
    const barW = Math.round((d.validated_seconds / Math.max(maxDwell, 1)) * 100);
    const stressForPart = (s.stress_during_top_parts || {})[part];
    const stressCell = stressForPart !== undefined
      ? `<span style="color:${stressColor(stressForPart)}">${(stressForPart*100).toFixed(0)}%</span>`
      : `<span style="color:var(--muted)">—</span>`;
    return `<tr>
      <td><strong>${part}</strong></td>
      <td>${d.dwell_seconds.toFixed(1)}s</td>
      <td>
        <span class="bar-mini" style="width:${barW}px"></span>
        ${d.validated_seconds.toFixed(1)}s
      </td>
      <td>${emoTag(d.dominant_emotion)}</td>
      <td>${stressCell}</td>
    </tr>`;
  }).join("");

  // ── Survey responses ───────────────────────────────────────────────────────
  const surveyQs = s.survey_questions || [];
  const surveyR  = {};  // fetched separately
  let surveyHtml = "";
  if (surveyQs.length) {
    surveyHtml = `
    <div class="section-title">Survey Responses</div>
    <div class="card">
      <div id="survey-responses">
        <div style="color:var(--muted);font-size:0.85rem">Loading survey answers…</div>
      </div>
    </div>`;
  }

  // ── Participant profile ────────────────────────────────────────────────────
  const profileItems = [
    u.gender       ? `Gender: <strong>${u.gender}</strong>` : null,
    u.profession   ? `Profession: <strong>${u.profession}</strong>` : null,
    u.ev_exp       ? `EV Familiarity: <strong>${u.ev_exp}/5</strong>` : null,
    u.owned_ev     ? `EV Experience: <strong>${u.owned_ev.replace(/_/g," ")}</strong>` : null,
    u.priorities?.length ? `Priorities: <strong>${u.priorities.join(", ")}</strong>` : null,
  ].filter(Boolean);

  const profileHtml = profileItems.map(i => `<div style="font-size:0.85rem;margin-bottom:6px;color:var(--muted)">${i}</div>`).join("");

  // ── Data quality ──────────────────────────────────────────────────────────
  const dqHtml = `
  <div style="font-size:0.82rem;color:var(--muted);line-height:1.8">
    Gaze events: <strong style="color:var(--text)">${s.gaze_event_count ?? "—"}</strong><br>
    Camera frames: <strong style="color:var(--text)">${s.camera_frame_count ?? "—"}</strong><br>
    Sensor samples: <strong style="color:var(--text)">${s.sensor_sample_count ?? "—"}</strong>
  </div>`;

  // ── Render page ────────────────────────────────────────────────────────────
  document.getElementById("content").innerHTML = `
    ${metricsHtml}

    <div class="section-title">AI Insights</div>
    <div class="card" style="margin-bottom:20px">
      <ul class="insight-list">${insightsHtml}</ul>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">Gaze Dwell Time by Area (validated)</div>
        <div class="chart-wrap"><canvas id="dwellChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Emotion Distribution</div>
        <div class="chart-wrap"><canvas id="emoChart"></canvas></div>
      </div>
    </div>

    ${stressTimeline.length ? `
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">Physiological Stress Over Time</div>
      <div class="chart-wrap-sm"><canvas id="stressChart"></canvas></div>
    </div>` : ""}

    <div class="section-title">Area-by-Area Breakdown</div>
    <div class="card" style="margin-bottom:20px; overflow-x:auto">
      <table>
        <thead><tr>
          <th>Area</th><th>Raw Dwell</th><th>Validated Dwell</th>
          <th>Dominant Emotion</th><th>Stress (correl.)</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>

    ${surveyHtml}

    <div class="grid2" style="margin-top:20px">
      <div class="card">
        <div class="card-title">Participant Profile</div>
        ${profileHtml}
      </div>
      <div class="card">
        <div class="card-title">Data Quality</div>
        ${dqHtml}
      </div>
    </div>`;

  // ── Charts ─────────────────────────────────────────────────────────────────
  new Chart(document.getElementById("dwellChart"), {
    type: "bar",
    data: {
      labels: chartPartLabels,
      datasets: [{
        label: "Validated dwell (s)",
        data:  chartPartVals,
        backgroundColor: "rgba(0,200,255,0.25)",
        borderColor:     "rgba(0,200,255,0.9)",
        borderWidth: 1.5, borderRadius: 4,
      }]
    },
    options: {
      animation: false, indexAxis: "y",
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color:"rgba(255,255,255,0.06)" }, ticks: { color:"#6b7280" } },
        y: { grid: { display: false }, ticks: { color:"#9ca3af", font:{size:11} } }
      }
    }
  });

  if (emoLabels.length) {
    new Chart(document.getElementById("emoChart"), {
      type: "doughnut",
      data: {
        labels: emoLabels,
        datasets: [{ data: emoVals, backgroundColor: emoColors, borderWidth: 2, borderColor:"#13161d" }]
      },
      options: {
        animation: false,
        plugins: {
          legend: { position:"right", labels:{ color:"#9ca3af", padding:10, font:{size:11} } }
        }
      }
    });
  }

  if (stressTimeline.length) {
    new Chart(document.getElementById("stressChart"), {
      type: "line",
      data: {
        labels: stressTimeline.map(p => `${p.t}s`),
        datasets: [{
          label: "Stress", data: stressTimeline.map(p => p.stress),
          borderColor:"#ef4444", backgroundColor:"rgba(239,68,68,0.08)",
          tension: 0.4, fill: true, borderWidth: 2, pointRadius: 0,
        }]
      },
      options: {
        animation: false,
        plugins: { legend:{display:false} },
        scales: {
          x: { grid:{color:"rgba(255,255,255,0.05)"}, ticks:{color:"#6b7280",maxTicksLimit:8} },
          y: { min:0, max:1, grid:{color:"rgba(255,255,255,0.05)"}, ticks:{color:"#6b7280"} }
        }
      }
    });
  }

  // ── Survey responses (loaded from session endpoint) ───────────────────────
  await loadSurveyResponses(surveyQs);
}

async function loadSurveyResponses(questions) {
  const el = document.getElementById("survey-responses");
  if (!el || !questions.length) return;

  try {
    const res = await fetch(`/api/session/${SESSION_ID}/summary`);
    const s   = await res.json();
    const r   = s.survey_responses;
    if (!r || !Object.keys(r).length) {
      el.innerHTML = `<div style="color:var(--muted);font-size:0.85rem">No survey responses recorded.</div>`;
      return;
    }

    // Map q-index back to questions
    let html = "";
    let qi = 0;
    questions.forEach(({part, question}) => {
      if (part === "general" && question.includes("1–10")) {
        const v = r["overall_rating"];
        html += `<div class="survey-q">
          <div class="sq-text">${question}</div>
          <div class="sq-ans">${v ? `<strong>${v}/10</strong>` : "Not answered"}</div>
        </div>`;
      } else if (part === "general") {
        const v = r[`q${qi++}`];
        html += `<div class="survey-q">
          <div class="sq-text">${question}</div>
          <div class="sq-ans">${v || "<em style='color:var(--muted)'>Not answered</em>"}</div>
        </div>`;
      } else {
        const v = r[`q${qi}`];
        html += `<div class="survey-q">
          <div class="sq-text"><em style="color:var(--accent2);font-size:0.78rem">${part}</em> — ${question}</div>
          <div class="sq-ans">${v ? stars(v) : "<em style='color:var(--muted)'>Not answered</em>"}</div>
        </div>`;
        qi++;
      }
    });

    const wb = r["would_buy"];
    if (wb) {
      html += `<div class="survey-q">
        <div class="sq-text">Purchase intent</div>
        <div class="sq-ans"><strong>${wb}</strong></div>
      </div>`;
    }

    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--muted);font-size:0.85rem">Could not load responses.</div>`;
  }
}

loadReport();
</script>
</body>
</html>
